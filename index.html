<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>MQTT WebSocket Dashboard</title>

  <!-- PAHO MQTT -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 15px;
      background: #f5f5f5;
    }

    h2 {
      margin-top: 0;
    }

    input,
    select,
    button {
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 10px;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
    }

    #status {
      background: red;
      color: white;
      padding: 10px;
      font-weight: bold;
      margin-bottom: 15px;
      border-radius: 5px;
    }

    #messages {
      background: yellow;
      padding: 10px;
      min-height: 80px;
      border-radius: 5px;
      overflow-wrap: break-word;
    }

    .section {
      border: 1px solid #ccc;
      border-radius: 5px;
      margin-bottom: 15px;
      background: white;
    }

    .section-header {
      background: #333;
      color: white;
      padding: 12px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
    }

    .section-content {
      display: none;
      padding: 15px;
    }
  </style>
</head>

<body>

  <h2>MQTT WebSocket Dashboard</h2>

  <div id="status">
    Not Connected
  </div>

  <!-- MQTT CONFIG -->
  <div class="section">

    <div class="section-header"
         onclick="toggleSection('configSection')">
      MQTT Config
    </div>

    <div class="section-content"
         id="configSection">

      Protocol:
      <select id="protocol">
        <option value="wss">wss</option>
        <option value="ws">ws</option>
      </select>

      Broker:
      <input type="text"
             id="broker"
             value="broker.emqx.io">

      Port:
      <input type="text"
             id="port"
             value="8084">

      Path:
      <input type="text"
             id="path"
             value="/mqtt">

      <button onclick="connectMQTT()">
        Connect
      </button>

    </div>
  </div>

  <!-- SUBSCRIBE -->
  <div class="section">

    <div class="section-header"
         onclick="toggleSection('subscribeSection')">
      Subscribe
    </div>

    <div class="section-content"
         id="subscribeSection">

      Topic:
      <input type="text"
             id="subtopic"
             placeholder="example/topic">

      <button onclick="subscribeTopic()">
        Subscribe
      </button>

    </div>
  </div>

  <!-- PUBLISH -->
  <div class="section">

    <div class="section-header"
         onclick="toggleSection('publishSection')">
      Publish
    </div>

    <div class="section-content"
         id="publishSection">

      Topic:
      <input type="text"
             id="pubtopic"
             placeholder="example/topic">

      Message:
      <input type="text"
             id="message"
             placeholder="hello mqtt">

      <button onclick="publishMessage()">
        Send Message
      </button>

    </div>
  </div>

  <!-- MESSAGE AREA -->
  <div class="section">

    <div class="section-header"
         onclick="toggleSection('messageSection')">
      Messages
    </div>

    <div class="section-content"
         id="messageSection"
         style="display:block;">

      <div id="messages">
        Waiting data...
      </div>

    </div>
  </div>

  <script>

    let client;
    let connected = false;

    // =========================
    // TOGGLE SECTION
    // =========================
    function toggleSection(id) {

      const section =
        document.getElementById(id);

      if (
        section.style.display === "none" ||
        section.style.display === ""
      ) {

        section.style.display = "block";

      } else {

        section.style.display = "none";
      }
    }

    // =========================
    // CONNECT MQTT
    // =========================
    function connectMQTT() {

      const protocol =
        document.getElementById("protocol").value;

      const broker =
        document.getElementById("broker").value;

      const port =
        parseInt(document.getElementById("port").value);

      const path =
        document.getElementById("path").value;

      const clientID =
        "web_" + Math.floor(Math.random() * 10000);

      const fullURL =
        protocol + "://" +
        broker + ":" +
        port + path;

      console.log("Connecting to:", fullURL);

      // IMPORTANT:
      // Full URL format for HTTPS compatibility

      client = new Paho.MQTT.Client(
        fullURL,
        clientID
      );

      // CONNECTION LOST
      client.onConnectionLost = function (responseObject) {

        connected = false;

        console.log("Connection Lost");

        document.getElementById("status").innerHTML =
          "Connection Lost";

        document.getElementById("status").style.background =
          "red";
      };

      // MESSAGE ARRIVED
      client.onMessageArrived = function (message) {

        console.log(message.payloadString);

        document.getElementById("messages").innerHTML =
          "<b>Topic:</b> " +
          message.destinationName +
          "<br><br>" +
          "<b>Message:</b> " +
          message.payloadString;
      };

      // CONNECT
      client.connect({

        useSSL: (protocol === "wss"),

        onSuccess: function () {

          connected = true;

          console.log("CONNECTED");

          document.getElementById("status").innerHTML =
            "Connected to " + broker;

          document.getElementById("status").style.background =
            "green";
        },

        onFailure: function (err) {

          console.log("FAILED:", err);

          document.getElementById("status").innerHTML =
            "Connection Failed";

          document.getElementById("status").style.background =
            "red";
        }
      });
    }

    // =========================
    // SUBSCRIBE
    // =========================
    function subscribeTopic() {

      if (!connected) {

        alert("Not connected");

        return;
      }

      const topic =
        document.getElementById("subtopic").value;

      client.subscribe(topic);

      console.log("Subscribed:", topic);

      document.getElementById("messages").innerHTML =
        "Subscribed to: " + topic;
    }

    // =========================
    // PUBLISH
    // =========================
    function publishMessage() {

      if (!connected) {

        alert("Not connected");

        return;
      }

      const topic =
        document.getElementById("pubtopic").value;

      const msg =
        document.getElementById("message").value;

      const message =
        new Paho.MQTT.Message(msg);

      message.destinationName = topic;

      client.send(message);

      console.log("Sent:", msg);

      document.getElementById("messages").innerHTML =
        "Message Sent:<br><br>" +
        msg;
    }

  </script>

</body>

</html>
