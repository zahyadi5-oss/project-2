<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MQTT EMQX Dashboard</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

  <style>
    body { font-family: Arial; }
    #status { background:red; color:white; padding:10px; }
    #messages { background:yellow; padding:10px; margin-top:10px; }
  </style>
</head>

<body>

<h2>ESP8266 MQTT (EMQX)</h2>

<div id="status">Not Connected</div>

<br>

<button onclick="connect()">Connect</button>

<br><br>

<input id="topic" placeholder="topic (esp/data)">
<button onclick="subscribe()">Subscribe</button>

<br><br>

<input id="msg" placeholder="message">
<button onclick="publish()">Send</button>

<div id="messages">Waiting...</div>

<script>

var client;
var connected = false;

// ================= CONNECT =================
function connect() {

  var clientID = "web_" + Math.floor(Math.random() * 10000);

  client = new Paho.MQTT.Client(
    "broker.emqx.io",
    8083,
    "/mqtt",
    clientID
  );

  client.onConnectionLost = function () {
    connected = false;
    document.getElementById("status").innerHTML = "Disconnected";
  };

  client.onMessageArrived = function (msg) {
    document.getElementById("messages").innerHTML =
      msg.destinationName + " : " + msg.payloadString;
  };

  client.connect({
    onSuccess: function () {
      connected = true;
      document.getElementById("status").innerHTML = "Connected to EMQX";
      console.log("CONNECTED");
    },
    onFailure: function (err) {
      console.log("FAILED:", err);
    }
  });
}

// ================= SUBSCRIBE =================
function subscribe() {
  if (!connected) return alert("Not connected");

  var t = document.getElementById("topic").value;
  client.subscribe(t);
  console.log("Subscribed:", t);
}

// ================= PUBLISH =================
function publish() {
  if (!connected) return alert("Not connected");

  var msg = document.getElementById("msg").value;
  var topic = document.getElementById("topic").value;

  var message = new Paho.MQTT.Message(msg);
  message.destinationName = topic;

  client.send(message);
}

</script>

</body>
</html>
