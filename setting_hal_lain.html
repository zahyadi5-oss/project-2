<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>MQTT Dashboard</title>

  <!-- PAHO MQTT -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

  <style>

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f2f2f2;
    }

    /* HEADER */
    .header {
      background: #222;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 5px;
    }

    .container {
      padding: 15px;
    }

    #status {
      background: red;
      color: white;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 15px;
      font-weight: bold;
    }

    #messages {
      background: yellow;
      padding: 15px;
      border-radius: 5px;
      min-height: 120px;
      overflow-wrap: break-word;
    }

    /* SETTINGS PANEL */
    #settingsPanel {

      position: fixed;
      top: 0;
      right: -100%;

      width: 320px;
      height: 100%;

      background: white;

      box-shadow: -2px 0 10px rgba(0,0,0,0.3);

      transition: right 0.3s ease;

      overflow-y: auto;

      padding: 20px;

      z-index: 999;
    }

    #settingsPanel.open {
      right: 0;
    }

    .closeBtn {
      background: red;
      color: white;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 5px;
      margin-bottom: 15px;
    }

    input,
    select,
    button {

      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }

    h3 {
      margin-top: 25px;
      margin-bottom: 10px;
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">

    <h2>MQTT Dashboard</h2>

    <button onclick="openSettings()">
      ⚙ Settings
    </button>

  </div>

  <!-- MAIN CONTENT -->
  <div class="container">

    <div id="status">
      Not Connected
    </div>

    <h3>Messages</h3>

    <div id="messages">
      Waiting data...
    </div>

  </div>

  <!-- SETTINGS PANEL -->
  <div id="settingsPanel">

    <button class="closeBtn"
            onclick="closeSettings()">
      Close
    </button>

    <!-- MQTT CONFIG -->
    <h3>Broker Config</h3>

    Protocol:
    <select id="protocol">
      <option value="wss">wss</option>
      <option value="ws">ws</option>
    </select>

    Broker:
    <input type="text"
           id="broker"
           value="broker.emqx.io">

    Port:
    <input type="text"
           id="port"
           value="8084">

    Path:
    <input type="text"
           id="path"
           value="/mqtt">

    <button onclick="connectMQTT()">
      Connect
    </button>

    <!-- SUBSCRIBE -->
    <h3>Subscribe</h3>

    Topic:
    <input type="text"
           id="subtopic"
           placeholder="example/topic">

    <button onclick="subscribeTopic()">
      Subscribe
    </button>

    <!-- PUBLISH -->
    <h3>Publish</h3>

    Topic:
    <input type="text"
           id="pubtopic"
           placeholder="example/topic">

    Message:
    <input type="text"
           id="message"
           placeholder="hello mqtt">

    <button onclick="publishMessage()">
      Send Message
    </button>

  </div>

  <script>

    let client;
    let connected = false;

    // =========================
    // OPEN SETTINGS
    // =========================
    function openSettings() {

      document
        .getElementById("settingsPanel")
        .classList.add("open");
    }

    // =========================
    // CLOSE SETTINGS
    // =========================
    function closeSettings() {

      document
        .getElementById("settingsPanel")
        .classList.remove("open");
    }

    // =========================
    // CONNECT MQTT
    // =========================
    function connectMQTT() {

      const protocol =
        document.getElementById("protocol").value;

      const broker =
        document.getElementById("broker").value;

      const port =
        parseInt(
          document.getElementById("port").value
        );

      const path =
        document.getElementById("path").value;

      const clientID =
        "web_" + Math.floor(Math.random() * 10000);

      const fullURL =
        protocol + "://" +
        broker + ":" +
        port + path;

      console.log("Connecting:", fullURL);

      client =
        new Paho.MQTT.Client(
          fullURL,
          clientID
        );

      // CONNECTION LOST
      client.onConnectionLost =
        function(responseObject) {

          connected = false;

          console.log("Connection Lost");

          document
            .getElementById("status")
            .innerHTML =
            "Connection Lost";

          document
            .getElementById("status")
            .style.background =
            "red";
        };

      // MESSAGE ARRIVED
      client.onMessageArrived =
        function(message) {

          console.log(message.payloadString);

          document
            .getElementById("messages")
            .innerHTML =
            "<b>Topic:</b> " +
            message.destinationName +
            "<br><br>" +
            "<b>Message:</b> " +
            message.payloadString;
        };

      // CONNECT
      client.connect({

        useSSL:
          (protocol === "wss"),

        onSuccess: function() {

          connected = true;

          console.log("CONNECTED");

          document
            .getElementById("status")
            .innerHTML =
            "Connected to " + broker;

          document
            .getElementById("status")
            .style.background =
            "green";
        },

        onFailure: function(err) {

          console.log("FAILED:", err);

          document
            .getElementById("status")
            .innerHTML =
            "Connection Failed";

          document
            .getElementById("status")
            .style.background =
            "red";
        }

      });
    }

    // =========================
    // SUBSCRIBE
    // =========================
    function subscribeTopic() {

      if (!connected) {

        alert("Not connected");

        return;
      }

      const topic =
        document
          .getElementById("subtopic")
          .value;

      client.subscribe(topic);

      console.log("Subscribed:", topic);

      document
        .getElementById("messages")
        .innerHTML =
        "Subscribed to:<br><br>" +
        topic;
    }

    // =========================
    // PUBLISH
    // =========================
    function publishMessage() {

      if (!connected) {

        alert("Not connected");

        return;
      }

      const topic =
        document
          .getElementById("pubtopic")
          .value;

      const msg =
        document
          .getElementById("message")
          .value;

      const message =
        new Paho.MQTT.Message(msg);

      message.destinationName =
        topic;

      client.send(message);

      console.log("Sent:", msg);

      document
        .getElementById("messages")
        .innerHTML =
        "Message Sent:<br><br>" +
        msg;
    }

  </script>

</body>
</html>
